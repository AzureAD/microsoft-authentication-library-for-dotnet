# template-OneBranch-Tests-libsandsamples.yaml
# Performs Nuget Restore and Build of LibsAndSamples.sln based on BuildPlatform and BuildConfiguration

parameters:
  BuildPlatform: 'any cpu'
  BuildConfiguration: 'release'
  MsalClientSemVer: '4.0.0-devopsbuild'
  MsalSourceDir: '' #Default MSAL Location

steps:

- template: template-OneBranch-CI-libsandsamples.yaml
  parameters:
    Solution: '${{ parameters.MsalSourceDir }}LibsAndSamples.sln'
    MsalSourceDir: '${{ parameters.MsalSourceDir }}'
    PipelineType: $(PipelineType)

  # Install Chrome and ChromeDriver for Selenium-based integration tests.
  # Chrome is downloaded via the official Google enterprise MSI (silent install).
  # ChromeDriver is matched to the installed Chrome version via the Chrome for Testing API.
  # SeleniumExtensions.cs resolves chromedriver via the CHROMEWEBDRIVER env var.
- task: PowerShell@2
  displayName: 'Install Chrome and ChromeDriver'
  inputs:
    targetType: 'inline'
    script: |
      $chromePath = "C:\Program Files\Google\Chrome\Application\chrome.exe"

      if (-not (Test-Path $chromePath)) {
        Write-Host "Chrome not found, downloading and installing..."
        $msiPath = "$env:TEMP\chrome_enterprise.msi"
        Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/googlechromestandaloneenterprise64.msi" -OutFile $msiPath -UseBasicParsing
        Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /quiet /norestart" -Wait -NoNewWindow
        Write-Host "Chrome installation complete."
      } else {
        Write-Host "Chrome already present."
      }

      # Get the installed Chrome version
      $chromeVersion = (Get-Item $chromePath).VersionInfo.ProductVersion
      $chromeMajor = $chromeVersion.Split('.')[0]
      Write-Host "Chrome version: $chromeVersion (major: $chromeMajor)"

      # Search for an existing chromedriver.exe shipped with VS Enterprise (available in the vse2022 container).
      # This avoids downloading from storage.googleapis.com which may be blocked in Official pipelines.
      $vsDriverPaths = @(
        "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\TestPlatform\Extensions\Selenium",
        "C:\Program Files (x86)\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\TestPlatform\Extensions\Selenium",
        "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\TestPlatform",
        "C:\Program Files (x86)\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\TestPlatform"
      )

      $driverBin = $null
      foreach ($searchPath in $vsDriverPaths) {
        if (Test-Path "$searchPath\chromedriver.exe") {
          $driverBin = $searchPath
          Write-Host "Found existing ChromeDriver in VS installation: $driverBin"
          break
        }
      }

      # Fall back: search recursively under VS install root
      if (-not $driverBin) {
        $vsRoot = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
        if (-not (Test-Path $vsRoot)) { $vsRoot = "C:\Program Files (x86)\Microsoft Visual Studio\2022\Enterprise" }
        if (Test-Path $vsRoot) {
          $found = Get-ChildItem -Path $vsRoot -Filter "chromedriver.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($found) {
            $driverBin = $found.DirectoryName
            Write-Host "Found existing ChromeDriver via search: $driverBin"
          }
        }
      }

      # Fall back: download from Chrome for Testing (may be blocked in Official pipelines)
      if (-not $driverBin) {
        Write-Host "ChromeDriver not found in VS installation, attempting download..."
        $driverVersion = (New-Object System.Net.WebClient).DownloadString("https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_$chromeMajor").Trim()
        Write-Host "Downloading ChromeDriver $driverVersion..."
        $driverDir = "C:\tools\chromedriver"
        $zipPath = "$env:TEMP\chromedriver.zip"
        Invoke-WebRequest -Uri "https://storage.googleapis.com/chrome-for-testing-public/$driverVersion/win64/chromedriver-win64.zip" -OutFile $zipPath -UseBasicParsing
        Expand-Archive -Path $zipPath -DestinationPath $driverDir -Force
        $driverBin = Join-Path $driverDir "chromedriver-win64"
      }

      Write-Host "##vso[task.setvariable variable=CHROMEWEBDRIVER]$driverBin"
      Write-Host "ChromeDriver resolved to: $driverBin"

  # Run All Desktop Tests
- template: template-run-all-tests.yaml
  parameters:
    BuildConfiguration: '$(BuildConfiguration)'

- task: VSTest@2
  displayName: 'Run cache compat tests'
  condition: and(succeeded(), eq(variables['RunTests'], 'true'))
  inputs:
    testSelector: 'testAssemblies'
    testAssemblyVer2: '**\CacheCompat\CommonCache.Test.Unit\bin\**\CommonCache.Test.Unit.dll'
    searchFolder: '$(System.DefaultWorkingDirectory)'
    codeCoverageEnabled: false
    failOnMinTestsNotRun: true
    minimumExpectedTests: '1'
    runInParallel: true
