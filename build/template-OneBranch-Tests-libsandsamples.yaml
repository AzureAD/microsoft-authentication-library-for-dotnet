# template-OneBranch-Tests-libsandsamples.yaml
# Performs Nuget Restore and Build of LibsAndSamples.sln based on BuildPlatform and BuildConfiguration

parameters:
  BuildPlatform: 'any cpu'
  BuildConfiguration: 'release'
  MsalClientSemVer: '4.0.0-devopsbuild'
  MsalSourceDir: '' #Default MSAL Location

steps:

- template: template-OneBranch-CI-libsandsamples.yaml
  parameters:
    Solution: '${{ parameters.MsalSourceDir }}LibsAndSamples.sln'
    MsalSourceDir: '${{ parameters.MsalSourceDir }}'
    PipelineType: $(PipelineType)

  # Install Chrome and ChromeDriver for Selenium-based integration tests.
  # The 1ES Windows 2022 image does not pre-install Chrome (unlike Microsoft-hosted windows-2022).
  # SeleniumExtensions.cs resolves chromedriver via the CHROMEWEBDRIVER env var first, so we set it here.
- task: PowerShell@2
  displayName: 'Install Chrome and ChromeDriver'
  inputs:
    targetType: 'inline'
    script: |
      choco install googlechrome chromedriver --yes --no-progress
      Write-Host "##vso[task.setvariable variable=CHROMEWEBDRIVER]C:\tools\selenium"

  # Run All Desktop Tests
- template: template-run-all-tests.yaml
  parameters:
    BuildConfiguration: '$(BuildConfiguration)'

- task: VSTest@2
  displayName: 'Run cache compat tests'
  condition: and(succeeded(), eq(variables['RunTests'], 'true'))
  inputs:
    testSelector: 'testAssemblies'
    testAssemblyVer2: '**\CacheCompat\CommonCache.Test.Unit\bin\**\CommonCache.Test.Unit.dll'
    searchFolder: '$(System.DefaultWorkingDirectory)'
    codeCoverageEnabled: false
    failOnMinTestsNotRun: true
    minimumExpectedTests: '1'
    runInParallel: true
