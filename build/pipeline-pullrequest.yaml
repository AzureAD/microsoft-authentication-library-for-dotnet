
# Do not run on CI
trigger: none

pr:
  autoCancel: false
  branches:
    include:
    - main

variables:
  BuildPlatform: 'any cpu'
  BuildConfiguration: 'Release'
  MsalSourceDir: '' # Empty for non-OneBranch pipelines (source is at repo root). OneBranch pipelines set this to a subdirectory.
  #intended for running all ui automation tests as one to reduce time
  ConsolidateAppCenterTests: true

#BUILD PHASE 

stages:
- template: template-build-and-run-all-tests.yaml
