parameters:
  BuildConfiguration: 'Release'
  TargetFramework:   'net8.0'

steps:

# Ensure the exact SDK is available on the agent
- task: UseDotNet@2
  displayName: 'Install .NET SDK 8.0.418'
  inputs:
    packageType: 'sdk'
    version: '8.0.418'
    includePreviewVersions: false
    performMultiLevelLookup: true

# Restore 
- task: DotNetCoreCLI@2
  displayName: Restore E2E project
  inputs:
    command: restore
    projects: tests/Microsoft.Identity.Test.E2E/Microsoft.Identity.Test.E2E.MSI.csproj
    restoreArguments: >
      /p:RestoreTargetFrameworks=net8.0
      /p:INCLUDE_MOBILE_AND_LEGACY_TFM=

# Build 
- task: DotNetCoreCLI@2
  displayName: Build E2E project
  inputs:
    command: build
    projects: tests/Microsoft.Identity.Test.E2E/Microsoft.Identity.Test.E2E.MSI.csproj
    arguments: >
      --configuration $(BuildConfiguration)
      --framework net8.0
      /p:INCLUDE_MOBILE_AND_LEGACY_TFM=

# Test
- task: VSTest@2
  displayName: Run Managed Identity E2E Tests - IMDSv2 (.NET)
  inputs:
    testSelector: testAssemblies
    testAssemblyVer2: '**/Microsoft.Identity.Test.E2E/bin/${{ parameters.BuildConfiguration }}/**/Microsoft.Identity.Test.E2E.MSI.dll'
    searchFolder: '$(System.DefaultWorkingDirectory)'
    runTestsInIsolation: true
    rerunFailedTests: true
    rerunMaxAttempts: '3'
    runInParallel: false
    # Temporarily relaxed: all tests in (MI_E2E_ImdsV2|MI_E2E_ImdsV2_Attested) are currently
    # [Ignore]d due to a test-infrastructure issue (AADSTS1000901). Restore failOnMinTestsNotRun: true
    # when the tests are re-enabled. Tracking: https://github.com/AzureAD/microsoft-authentication-library-for-dotnet/issues/6032
    failOnMinTestsNotRun: false
    minimumExpectedTests: '0'
    testFiltercriteria: '(TestCategory=MI_E2E_ImdsV2|TestCategory=MI_E2E_ImdsV2_Attested)'
