parameters:
- name: ImdsResource
  type: string
  default: 'https://management.azure.com/'

- name: UserAssignedClientId
  type: string
  default: ''

- name: ImdsApiVersion
  type: string
  default: '2018-02-01'

steps:
- powershell: |
    # IMDS Token Smoke Test (Windows PowerShell 5.1) - SELF-DOCUMENTING + SAFE LOGGING
    $ErrorActionPreference = 'Stop'
    $ProgressPreference = 'SilentlyContinue'

    function Banner([string]$title) {
      Write-Host ""
      Write-Host "============================================================"
      Write-Host $title
      Write-Host "============================================================"
    }

    function Step([int]$n, [string]$title) {
      Write-Host ""
      Write-Host ("[STEP {0}] {1}" -f $n, $title)
      Write-Host "------------------------------------------------------------"
    }

    function Info([string]$t) { Write-Host ("  [INFO] {0}" -f $t) }
    function Good([string]$t) { Write-Host ("  [ OK ] {0}" -f $t) }
    function Warn([string]$t) { Write-Host ("  [WARN] {0}" -f $t) }

    Banner "IMDS Token Smoke Test (PS 5.1) - SAFE + SELF-DOCUMENTING"

    # Inputs from template parameters
    $baseUri    = "http://169.254.169.254/metadata/identity/oauth2/token"
    $apiVersion = "${{ parameters.ImdsApiVersion }}"
    $resource   = "${{ parameters.ImdsResource }}"
    $clientId   = "${{ parameters.UserAssignedClientId }}"

    Step 1 "What this test does"
    Info "Calls IMDS from inside the VM to request a Managed Identity access token."
    Info "Success means: IMDS reachable + identity assigned + token issued."
    Info "We never print the access_token. Only safe metadata."

    Step 2 "Choose identity (System-Assigned vs User-Assigned)"
    if ([string]::IsNullOrWhiteSpace($clientId)) {
      Good "Identity mode: System-Assigned / Default (no client_id provided)."
      Info "If you expect a User-Assigned MI, pass UserAssignedClientId (we will not log its value)."
    } else {
      Good "Identity mode: User-Assigned (client_id provided; value hidden)."
      Info "IMDS will issue a token for that identity if it is assigned to this VM."
    }

    Step 3 "Show request configuration"
    Write-Host ("  IMDS endpoint : {0}" -f $baseUri)
    Write-Host ("  api-version   : {0}" -f $apiVersion)
    Write-Host ("  resource      : {0}" -f $resource)
    Info "resource controls token audience (who the token is for)."

    Step 4 "Build request URI safely (UriBuilder)"
    $ub = New-Object System.UriBuilder($baseUri)
    $resourceEncoded = [System.Uri]::EscapeDataString($resource)

    $query = "api-version=$apiVersion&resource=$resourceEncoded"
    if (-not [string]::IsNullOrWhiteSpace($clientId)) {
      $query += "&client_id=$([System.Uri]::EscapeDataString($clientId))"
    }

    $ub.Query = $query
    $uri = $ub.Uri.AbsoluteUri

    $safe = "http://169.254.169.254/metadata/identity/oauth2/token?api-version=$apiVersion&resource=<urlencoded>"
    if (-not [string]::IsNullOrWhiteSpace($clientId)) { $safe += "&client_id=<hidden>" }
    Write-Host ("  request (safe): {0}" -f $safe)

    try { [void][System.Uri]$uri; Good "URI validation: OK" }
    catch { throw ("Constructed IMDS URI is invalid. Uri='{0}'. Error: {1}" -f $uri, $_.Exception.Message) }

    Step 5 "Call IMDS (HTTP GET, Metadata=true)"
    Info "IMDS requires request header: Metadata=true"
    $headers = @{ Metadata = "true" }

    $sw = [System.Diagnostics.Stopwatch]::StartNew()

    try {
      $resp = Invoke-WebRequest -Method GET -Uri $uri -Headers $headers -TimeoutSec 15 -UseBasicParsing
      $sw.Stop()

      Write-Host ("  HTTP Status   : {0} {1}" -f $resp.StatusCode, $resp.StatusDescription)
      Write-Host ("  Duration (ms) : {0}" -f $sw.ElapsedMilliseconds)

      if ($resp.StatusCode -ne 200) { throw ("IMDS returned non-200 status: {0}" -f $resp.StatusCode) }
      Good "IMDS reachable and responded successfully."

      Step 6 "Parse JSON and validate token safely (no token output)"
      $json = $resp.Content | ConvertFrom-Json

      if ($null -eq $json.access_token -or [string]::IsNullOrWhiteSpace($json.access_token)) {
        throw "IMDS returned 200 but access_token is missing/empty."
      }

      Good "Token present (not printed)."
      Write-Host ("  token_type   : {0}" -f $json.token_type)
      Write-Host ("  resource     : {0}" -f $json.resource)
      Write-Host ("  expires_in   : {0}" -f $json.expires_in)
      Write-Host ("  expires_on   : {0}" -f $json.expires_on)
      Write-Host ("  not_before   : {0}" -f $json.not_before)
      Write-Host ("  token_length : {0} (token NOT printed)" -f $json.access_token.Length)

      Step 7 "Diagnostic headers (for escalation)"
      Info "Capture x-ms-request-id when escalating to IMDS/MI owners."
      foreach ($k in $resp.Headers.Keys) {
        if ($k -match 'Authorization|Set-Cookie|Cookie') { continue }
        Write-Host ("  {0}: {1}" -f $k, $resp.Headers[$k])
      }

      Step 8 "One-line summary (easy for Log Analyzer to parse)"
      $requestId = ""
      if ($resp.Headers["x-ms-request-id"]) { $requestId = $resp.Headers["x-ms-request-id"] }

      $identityMode = "system"
      if (-not [string]::IsNullOrWhiteSpace($clientId)) { $identityMode = "user" }

      Write-Host ("IMDS_RESULT status={0} duration_ms={1} identity={2} resource={3} token_type={4} expires_in={5} request_id={6} safe_logging=true" -f `
        $resp.StatusCode, $sw.ElapsedMilliseconds, $identityMode, $json.resource, $json.token_type, $json.expires_in, $requestId)

      Banner "RESULT: SUCCESS"

    } catch {
      $sw.Stop()
      Banner "RESULT: FAILURE"
      Write-Host ("Error: {0}" -f $_.Exception.Message)

      if ($_.Exception.Response -ne $null) {
        try {
          $statusCode = $_.Exception.Response.StatusCode.value__
          Write-Host ("HTTP StatusCode: {0}" -f $statusCode)

          $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
          $body = $reader.ReadToEnd()
          Write-Host "Response body:"
          Write-Host $body
        } catch {
          Warn "Unable to read error response body."
        }
      }

      $identityMode = "system"
      if (-not [string]::IsNullOrWhiteSpace($clientId)) { $identityMode = "user" }

      Write-Host ("IMDS_RESULT status=ERROR duration_ms={0} identity={1} resource={2} safe_logging=true error={3}" -f `
        $sw.ElapsedMilliseconds, $identityMode, $resource, ($_.Exception.Message -replace '\s+',' '))

      throw
    }
  displayName: 'IMDS: Acquire token (PS only, self-documenting logs)'
