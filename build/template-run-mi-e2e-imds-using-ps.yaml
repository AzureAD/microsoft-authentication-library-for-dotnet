# IMDS Token Smoke Test (Windows PowerShell 5.1 compatible) - SELF-DOCUMENTING + SAFE LOGGING
# Goal: Make pipeline output a study guide for support engineers.

$ErrorActionPreference = 'Stop'
$ProgressPreference = 'SilentlyContinue'

function Banner($title) {
    Write-Host ""
    Write-Host "============================================================"
    Write-Host $title
    Write-Host "============================================================"
}

function Step($n, $title) {
    Write-Host ""
    Write-Host ("[STEP {0}] {1}" -f $n, $title)
    Write-Host ("------------------------------------------------------------")
}

function Note($text) { Write-Host ("  ℹ {0}" -f $text) }
function Ok($text)   { Write-Host ("  ✅ {0}" -f $text) }
function Warn($text) { Write-Host ("  ⚠ {0}" -f $text) }

Banner "IMDS Token Smoke Test (Windows PowerShell 5.1) - SAFE + SELF-DOCUMENTING"

# -----------------------------
# Inputs (can be substituted by pipeline template parameters)
# -----------------------------
$baseUri    = "http://169.254.169.254/metadata/identity/oauth2/token"
$apiVersion = "2018-02-01"
$resource   = "https://management.azure.com/"   # audience (ARM)
$clientId   = ""                                # optional UAMI client_id; leave empty for system-assigned

# STEP 1: Explain what IMDS is and what we are about to do
Step 1 "What this test does"
Note "This test calls the Azure Instance Metadata Service (IMDS) from inside the VM to request a Managed Identity access token."
Note "If this succeeds (HTTP 200 + token_type/expires fields), IMDS is reachable AND the VM has a usable identity."
Note "We never print the access_token. We only log safe metadata."

# STEP 2: Explain identity selection
Step 2 "Choose identity (System-Assigned vs User-Assigned)"
if ([string]::IsNullOrWhiteSpace($clientId)) {
    Ok "Identity mode: System-Assigned / Default (no client_id provided)."
    Note "If you expect a User-Assigned MI, pass client_id (we will not log its value)."
} else {
    Ok "Identity mode: User-Assigned (client_id provided; value hidden)."
    Note "IMDS will issue a token for that specific User-Assigned identity if it's assigned to this VM."
}

# STEP 3: Explain request configuration
Step 3 "Build IMDS request (safe to log)"
Write-Host ("  IMDS endpoint : {0}" -f $baseUri)
Write-Host ("  api-version   : {0}" -f $apiVersion)
Write-Host ("  resource      : {0}" -f $resource)
Note "resource controls the token audience (who the token is for). Here it's Azure Resource Manager."

# STEP 4: Construct URI safely (avoid pipeline/YAML string concat pitfalls)
Step 4 "Construct request URI safely (UriBuilder)"
$ub = New-Object System.UriBuilder($baseUri)
$resourceEncoded = [System.Uri]::EscapeDataString($resource)

$query = "api-version=$apiVersion&resource=$resourceEncoded"
if (-not [string]::IsNullOrWhiteSpace($clientId)) {
    $query += "&client_id=$([System.Uri]::EscapeDataString($clientId))"
}

$ub.Query = $query
$uri = $ub.Uri.AbsoluteUri

# Safe request output (no secrets)
$safe = "http://169.254.169.254/metadata/identity/oauth2/token?api-version=$apiVersion&resource=<urlencoded>"
if (-not [string]::IsNullOrWhiteSpace($clientId)) { $safe += "&client_id=<hidden>" }
Write-Host ("  request (safe): {0}" -f $safe)

# Validate URI
try { [void][System.Uri]$uri; Ok "URI validation: OK" }
catch { throw "Constructed IMDS URI is invalid. Uri='$uri'. Error: $($_.Exception.Message)" }

# STEP 5: Perform the HTTP call
Step 5 "Call IMDS (HTTP GET with Metadata=true)"
Note "IMDS requires the request header Metadata: true"
$headers = @{ Metadata = "true" }

$sw = [System.Diagnostics.Stopwatch]::StartNew()
try {
    $resp = Invoke-WebRequest -Method GET -Uri $uri -Headers $headers -TimeoutSec 15 -UseBasicParsing
    $sw.Stop()

    Write-Host ("  HTTP Status  : {0} {1}" -f $resp.StatusCode, $resp.StatusDescription)
    Write-Host ("  Duration(ms) : {0}" -f $sw.ElapsedMilliseconds)

    if ($resp.StatusCode -ne 200) {
        throw ("IMDS returned non-200 status: {0}" -f $resp.StatusCode)
    }
    Ok "IMDS reachable and responded successfully (200)."

    # STEP 6: Parse JSON and validate token (without printing it)
    Step 6 "Parse JSON response and validate token safely"
    $json = $resp.Content | ConvertFrom-Json

    if ($null -eq $json.access_token -or [string]::IsNullOrWhiteSpace($json.access_token)) {
        throw "IMDS returned 200 but access_token is missing/empty."
    }

    Ok "Token present (not printed)."
    Write-Host ("  token_type   : {0}" -f $json.token_type)
    Write-Host ("  resource     : {0}" -f $json.resource)
    Write-Host ("  expires_in   : {0} seconds" -f $json.expires_in)
    Write-Host ("  expires_on   : {0} (epoch)" -f $json.expires_on)
    Write-Host ("  not_before   : {0} (epoch)" -f $json.not_before)
    Write-Host ("  token_length : {0} (token NOT printed)" -f $json.access_token.Length)

    Note "If token_length is unexpectedly small or missing, treat as suspicious even if HTTP 200."

    # STEP 7: Print diagnostic headers for escalation
    Step 7 "Print response headers for troubleshooting (sanitized)"
    Note "Capture x-ms-request-id when escalating to Managed Identity/IMDS owners."
    foreach ($k in $resp.Headers.Keys) {
        if ($k -match 'Authorization|Set-Cookie|Cookie') { continue }
        Write-Host ("  {0}: {1}" -f $k, $resp.Headers[$k])
    }

    # STEP 8: Emit ONE machine-readable summary line for your Log Analyzer
    Step 8 "Machine-readable summary (for Log Analyzer parsing)"
    $requestId = ""
    if ($resp.Headers["x-ms-request-id"]) { $requestId = $resp.Headers["x-ms-request-id"] }

    $identityMode = "system"
    if (-not [string]::IsNullOrWhiteSpace($clientId)) { $identityMode = "user" }

    # Single-line, stable format, easy regex/JSON-ish parsing
    Write-Host ("IMDS_RESULT status={0} duration_ms={1} identity={2} resource={3} token_type={4} expires_in={5} request_id={6} safe_logging=true" -f `
        $resp.StatusCode, $sw.ElapsedMilliseconds, $identityMode, $json.resource, $json.token_type, $json.expires_in, $requestId)

    Banner "RESULT: SUCCESS (IMDS token acquired safely)"

} catch {
    $sw.Stop()

    Banner "RESULT: FAILURE (IMDS token NOT acquired)"
    Write-Host ("Error: {0}" -f $_.Exception.Message)

    # Try to surface HTTP error body if present
    if ($_.Exception.Response -ne $null) {
        try {
            $statusCode = $_.Exception.Response.StatusCode.value__
            Write-Host ("HTTP StatusCode: {0}" -f $statusCode)

            $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
            $body = $reader.ReadToEnd()
            Write-Host "Response body:"
            Write-Host $body
        } catch {
            Warn "Unable to read error response body."
        }
    }

    # Emit machine-readable failure summary too
    $identityMode = "system"
    if (-not [string]::IsNullOrWhiteSpace($clientId)) { $identityMode = "user" }

    Write-Host ("IMDS_RESULT status=ERROR duration_ms={0} identity={1} resource={2} safe_logging=true error=""{3}""" -f `
        $sw.ElapsedMilliseconds, $identityMode, $resource, ($_.Exception.Message -replace '"',''''))

    throw
}
